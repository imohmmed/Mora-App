kind = "mobile"
previewPath = "/"
title = "Mora"
version = "1.0.0"
id = "artifacts/mora"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26251

[services.development]
run = "pnpm --filter @workspace/mora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mora", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mora", "run", "serve" ]

[services.env]
PORT = "26251"
BASE_PATH = "/"
