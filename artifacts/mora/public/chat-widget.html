<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <script>
      // Always render Chatwoot in LIGHT mode (its built-in dark theme renders
      // text too faint). The app applies a CSS invert() filter on the iframe
      // for dark mode instead — see chat.tsx.
      document.documentElement.style.background = "#FFFFFF";
      document.documentElement.style.colorScheme = "light";
    </script>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #FFFFFF; }

      /* Make the Chatwoot widget FILL this iframe completely — no popup box. */
      .woot-widget-holder {
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 100% !important;
        max-height: none !important;
        min-height: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        transform: none !important;
      }
      /* Hide the floating bubble and the close / back buttons */
      .woot--bubble-holder,
      .woot-widget-bubble,
      button[aria-label="Close Widget"],
      button[aria-label="Close"],
      button[aria-label="close"],
      button[aria-label="Go back"],
      .close-button,
      .back-button { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    </style>
  </head>
  <body>
    <script>
      function hideCloseBtns() {
        document.querySelectorAll("button").forEach(function (btn) {
          var label = (btn.getAttribute("aria-label") || "").toLowerCase();
          var cls = btn.className || "";
          if (
            label.indexOf("close") !== -1 || label.indexOf("back") !== -1 ||
            cls.indexOf("close") !== -1 || cls.indexOf("back") !== -1
          ) { btn.style.display = "none"; }
        });
      }
      new MutationObserver(hideCloseBtns).observe(document.documentElement, { childList: true, subtree: true });
      setInterval(hideCloseBtns, 800);

      window.chatwootSettings = {
        hideMessageBubble: true,
        position: "right",
        locale: "ar",
        type: "standard",
        darkMode: "light",
        showPopoutButton: false,
      };

      (function (d, t) {
        var BASE = "https://chat.moramoda.tech";
        var TOKEN = "WPeCyRzhWzff2TuFHRe27SaQ";
        var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
        g.src = BASE + "/packs/js/sdk.js";
        g.async = true; g.defer = true;
        g.onload = function () {
          window.chatwootSDK.run({ websiteToken: TOKEN, baseUrl: BASE });
        };
        s.parentNode.insertBefore(g, s);
      })(document, "script");

      // When embedded in another iframe the height isn't stable at boot, so
      // Chatwoot renders a collapsed (header-only) widget. We force it to
      // recompute and fill the frame by (a) re-dispatching resize whenever the
      // viewport size actually changes (ResizeObserver — robust across devices)
      // and (b) a few timed nudges as a fallback for the very first paint.
      function nudge() {
        try { window.dispatchEvent(new Event("resize")); } catch (e) {}
      }
      window.addEventListener("chatwoot:ready", function () {
        try { window.$chatwoot.toggle("open"); } catch (e) {}
        [100, 400, 900, 1600, 2600].forEach(function (ms) { setTimeout(nudge, ms); });
      });
      try {
        new ResizeObserver(nudge).observe(document.documentElement);
      } catch (e) {}
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", nudge);
      }
    </script>
  </body>
</html>
