            application/json:
              schema:
                $ref: "#/components/schemas/CollectionListResponse"
    post:
      operationId: adminCreateCollection
      tags: [collections]
      security: [{ bearerAuth: [] }]
      summary: Create a collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionResponse"

  /admin/collections/{id}:
    get:
      operationId: adminGetCollection
      tags: [collections]
      security: [{ bearerAuth: [] }]
      summary: Get a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionResponse"
    put:
      operationId: adminUpdateCollection
      tags: [collections]
      security: [{ bearerAuth: [] }]
      summary: Update a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUpdate"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionResponse"
    delete:
      operationId: adminDeleteCollection
      tags: [collections]
      security: [{ bearerAuth: [] }]
      summary: Delete a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  # ─── Variants ────────────────────────────────────────────────────────────────

  /admin/variants:
