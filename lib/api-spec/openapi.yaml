          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Variant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantListResponse"

  /admin/variants/{id}/update:
    put:
      operationId: adminUpdateVariant
      tags: [variants]
      security: [{ bearerAuth: [] }]
      summary: Update a variant
      parameters:
