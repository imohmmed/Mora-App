            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetailResponse"
    put:
      operationId: adminUpdateCustomer
      tags: [customers]
      security: [{ bearerAuth: [] }]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
    delete:
