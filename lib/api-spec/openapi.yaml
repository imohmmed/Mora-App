openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Mora e-commerce admin API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: analytics
  - name: products
  - name: collections
  - name: variants
  - name: orders
  - name: customers
  - name: campaigns
  - name: discounts
  - name: content
  - name: markets
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Analytics ───────────────────────────────────────────────────────────────

  /admin/analytics/summary:
    get:
      operationId: adminGetAnalyticsSummary
      tags: [analytics]
      security: [{ bearerAuth: [] }]
      summary: Get analytics overview
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummaryResponse"

  /admin/analytics/revenue:
    get:
      operationId: adminGetRevenueChart
      tags: [analytics]
      security: [{ bearerAuth: [] }]
      summary: Revenue over time
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 14
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueChartResponse"

  /admin/analytics/top-products:
    get:
      operationId: adminGetTopProducts
      tags: [analytics]
      security: [{ bearerAuth: [] }]
      summary: Top selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopProductsResponse"

  /admin/analytics/reports:
    get:
      operationId: adminGetAnalyticsReports
      tags: [analytics]
      security: [{ bearerAuth: [] }]
      summary: Key metric reports
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsReportsResponse"

  /admin/analytics/live:
    get:
      operationId: adminGetLiveOrders
      tags: [analytics]
      security: [{ bearerAuth: [] }]
      summary: Recent live orders
      responses:
        "200":
          description: Live orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  # ─── Products ────────────────────────────────────────────────────────────────

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [products]
      security: [{ bearerAuth: [] }]
      summary: List all products
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: adminCreateProduct
      tags: [products]
      security: [{ bearerAuth: [] }]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"

  /admin/products/{id}:
    get:
      operationId: adminGetProduct
      tags: [products]
      security: [{ bearerAuth: [] }]
      summary: Get a product with variants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"
    put:
      operationId: adminUpdateProduct
      tags: [products]
      security: [{ bearerAuth: [] }]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
    delete:
      operationId: adminDeleteProduct
      tags: [products]
      security: [{ bearerAuth: [] }]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

