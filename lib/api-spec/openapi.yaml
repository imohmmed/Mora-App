  # ─── Orders ──────────────────────────────────────────────────────────────────

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [orders]
      security: [{ bearerAuth: [] }]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [orders, drafts, abandoned]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: adminCreateOrder
      tags: [orders]
      security: [{ bearerAuth: [] }]
      summary: Create an order (draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
