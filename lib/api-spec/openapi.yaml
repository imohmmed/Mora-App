      security: [{ bearerAuth: [] }]
      summary: Update a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketUpdate"
      responses:
        "200":
          description: Updated market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketResponse"
    delete:
      operationId: adminDeleteMarket
      tags: [markets]
      security: [{ bearerAuth: [] }]
      summary: Delete a market
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  # ─── Settings ─────────────────────────────────────────────────────────────────

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Get store settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    put:
      operationId: adminUpdateSettings
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Update store settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── Common ───────────────────────────────────────────────────────────────

    DeletedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            deleted:
              type: boolean
          required: [deleted]
        meta:
          type: object
        error:
          type: ["string", "null"]
      required: [data, meta, error]

    ListMeta:
      type: object
      properties:
        total:
          type: integer
      required: [total]

    # ─── Product ──────────────────────────────────────────────────────────────

    Product:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        vendor: { type: string }
        category: { type: string }
        description: { type: string }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        images: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        status: { type: string }
        totalInventory: { type: ["integer", "null"] }
        variantsCount: { type: ["integer", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, title, vendor, category, price, status]

    Variant:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        title: { type: string }
        sku: { type: string }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        inventory: { type: integer }
        option1: { type: ["string", "null"] }
        option2: { type: ["string", "null"] }
      required: [id, productId, title, sku, price, inventory]

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: "#/components/schemas/Variant"
          required: [variants]

    ProductInput:
      type: object
      properties:
        title: { type: string }
        vendor: { type: string }
        category: { type: string }
        description: { type: string }
        price: { type: number }
        compareAtPrice: { type: ["number", "null"] }
        images: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        status: { type: string }
      required: [title, vendor, category, price]

    ProductUpdate:
      type: object
      properties:
        title: { type: string }
        vendor: { type: string }
        category: { type: string }
        description: { type: string }
        price: { type: number }
        compareAtPrice: { type: ["number", "null"] }
        images: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        status: { type: string }

    VariantInput:
      type: object
      properties:
        productId: { type: string }
        title: { type: string }
        sku: { type: string }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        inventory: { type: integer }
        option1: { type: ["string", "null"] }
        option2: { type: ["string", "null"] }
      required: [productId]

    VariantUpdate:
      type: object
      properties:
        inventory: { type: integer }
        price: { type: number }
        sku: { type: string }
        title: { type: string }
        comparePrice: { type: ["number", "null"] }

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          $ref: "#/components/schemas/ListMeta"
        error:
          type: ["string", "null"]
      required: [data, meta, error]

    ProductResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Product"
        meta:
          type: object
        error:
          type: ["string", "null"]
      required: [data, meta, error]

